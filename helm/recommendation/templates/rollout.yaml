apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: recommendation
  labels:
    app.kubernetes.io/name: recommendation
    app.kubernetes.io/part-of: astronomy-shop
spec:
  replicas: 1
  strategy:
    canary:
      maxSurge: 1
      maxUnavailable: 0
      steps:
        - setWeight: 100
  selector:
    matchLabels:
      app.kubernetes.io/name: recommendation
  template:
    metadata:
      labels:
        app.kubernetes.io/name: recommendation
        app.kubernetes.io/part-of: astronomy-shop
    spec:
      serviceAccountName: recommendation
      containers:
        - name: recommendation
          image: REPLACE_ME/recommendation:REPLACE_ME
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: recommendation-config
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
