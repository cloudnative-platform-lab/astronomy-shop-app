apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: frontend-proxy
  labels:
    app.kubernetes.io/name: frontend-proxy
    app.kubernetes.io/part-of: astronomy-shop
spec:
  replicas: 1
  strategy:
    canary:
      maxSurge: 1
      maxUnavailable: 0
      steps:
        - setWeight: 100
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend-proxy
        app.kubernetes.io/part-of: astronomy-shop
    spec:
      serviceAccountName: frontend-proxy
      containers:
        - name: frontend-proxy
          image: REPLACE_ME/frontend-proxy:REPLACE_ME
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: frontend-proxy-config
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 150m
              memory: 128Mi
            limits:
              cpu: 400m
              memory: 256Mi
