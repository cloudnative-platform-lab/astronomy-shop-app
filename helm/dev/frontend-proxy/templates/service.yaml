apiVersion: v1
kind: Service
metadata:
  name: frontend-proxy
  labels:
    app.kubernetes.io/name: frontend-proxy
    app.kubernetes.io/part-of: astronomy-shop
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: frontend-proxy
  ports:
    - name: http
      port: 8080
      targetPort: http
