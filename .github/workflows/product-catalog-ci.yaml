name: Cart CI/CD

on:
  workflow_dispatch:
    inputs:
      promote_to:
        description: Environment to promote the existing cart image to
        required: true
        type: choice
        options:
          - staging
          - prod
      image_tag:
        description: Existing image tag to promote. Leave empty to promote from the previous environment values file.
        required: false
        type: string
  pull_request:
    paths:
      - "src/cart/**"
      - "gitops/charts/astronomy-shop-service/**"
      - "gitops/helm-values/dev/cart-values.yaml"
      - "gitops/helm-values/staging/cart-values.yaml"
      - "gitops/helm-values/prod/cart-values.yaml"
      - ".github/workflows/cart-ci.yml"
  push:
    branches:
      - main
    paths:
      - "src/cart/**"
      - "gitops/charts/astronomy-shop-service/**"
      - "gitops/helm-values/dev/cart-values.yaml"
      - "gitops/helm-values/staging/cart-values.yaml"
      - "gitops/helm-values/prod/cart-values.yaml"
      - ".github/workflows/cart-ci.yml"

permissions:
  attestations: write
  contents: write
  id-token: write
  security-events: write

concurrency:
  group: cart-ci-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
  PROJECT_NAME: astronomy-shop
  SERVICE_NAME: cart
  SERVICE_PATH: src/cart
  DOCKERFILE_PATH: src/cart/Dockerfile
  IMAGE_TAG: ${{ github.sha }}
  DEV_VALUES_FILE: gitops/helm-values/dev/cart-values.yaml
  STAGING_VALUES_FILE: gitops/helm-values/staging/cart-values.yaml
  PROD_VALUES_FILE: gitops/helm-values/prod/cart-values.yaml

jobs:
  cart-ci:
    name: Cart checks, image build, and dev update
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore cart dependencies
        run: dotnet restore "${SERVICE_PATH}"

      - name: Run cart tests
        run: dotnet test "${SERVICE_PATH}" --no-restore

      - name: SAST scan
        uses: github/codeql-action/init@v3
        with:
          languages: csharp

      - name: CodeQL analyze
        uses: github/codeql-action/analyze@v3

      - name: Dependency scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: ${{ env.SERVICE_PATH }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"

      - name: Configure image metadata
        run: |
          ECR_REPOSITORY_NAME="${PROJECT_NAME}/${SERVICE_NAME}"
          ECR_REPOSITORY="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY_NAME}"
          if [ "${{ github.event_name }}" = "push" ]; then
            IMAGE_URI="${ECR_REPOSITORY}:${IMAGE_TAG}"
          else
            IMAGE_URI="${SERVICE_NAME}:${IMAGE_TAG}"
          fi
          echo "ECR_REPOSITORY_NAME=${ECR_REPOSITORY_NAME}" >> "${GITHUB_ENV}"
          echo "ECR_REPOSITORY=${ECR_REPOSITORY}" >> "${GITHUB_ENV}"
          echo "IMAGE_URI=${IMAGE_URI}" >> "${GITHUB_ENV}"

      - name: Build cart image
        run: |
          docker build \
            --file "${DOCKERFILE_PATH}" \
            --tag "${IMAGE_URI}" \
            .

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.IMAGE_URI }}
          format: sarif
          output: trivy-cart.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-cart.sarif

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE_URI }}
          format: spdx-json
          output-file: cart-sbom.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: cart-sbom
          path: cart-sbom.spdx.json

      - name: Configure AWS credentials
        if: github.event_name == 'push'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: github.event_name == 'push'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push image to ECR
        if: github.event_name == 'push'
        run: docker push "${IMAGE_URI}"

      - name: Resolve pushed image digest
        if: github.event_name == 'push'
        run: |
          IMAGE_DIGEST="$(aws ecr describe-images \
            --repository-name "${ECR_REPOSITORY_NAME}" \
            --image-ids imageTag="${IMAGE_TAG}" \
            --query 'imageDetails[0].imageDigest' \
            --output text)"
          if [ -z "${IMAGE_DIGEST}" ] || [ "${IMAGE_DIGEST}" = "None" ]; then
            echo "Unable to resolve digest for ${IMAGE_URI}" >&2
            exit 1
          fi
          echo "IMAGE_DIGEST=${IMAGE_DIGEST}" >> "${GITHUB_ENV}"
          echo "IMAGE_REF=${ECR_REPOSITORY}@${IMAGE_DIGEST}" >> "${GITHUB_ENV}"

      - name: Install Cosign
        if: github.event_name == 'push'
        uses: sigstore/cosign-installer@v3

      - name: Sign image digest
        if: github.event_name == 'push'
        run: cosign sign "${IMAGE_REF}"
        env:
          COSIGN_YES: "true"

      - name: Attest image provenance
        if: github.event_name == 'push'
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.ECR_REPOSITORY }}
          subject-digest: ${{ env.IMAGE_DIGEST }}
          push-to-registry: true

      - name: Attest SBOM
        if: github.event_name == 'push'
        run: cosign attest --predicate "${SERVICE_NAME}-sbom.spdx.json" --type spdxjson "${IMAGE_REF}"
        env:
          COSIGN_YES: "true"

      - name: Update dev Helm values image
        if: github.event_name == 'push'
        run: |
          python scripts/ci/update_image_values.py set \
            --file "${DEV_VALUES_FILE}" \
            --repository "${ECR_REPOSITORY}" \
            --tag "${IMAGE_TAG}" \
            --digest "${IMAGE_DIGEST}"

      - name: Commit dev GitOps image update
        if: github.event_name == 'push'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "[CI]: Promote cart image to dev"
          file_pattern: gitops/helm-values/dev/cart-values.yaml

  cart-promotion:
    name: Promote cart image
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: ${{ inputs.promote_to }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        if: inputs.image_tag != ''
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Promote image tag
        run: |
          SOURCE_FILE="${DEV_VALUES_FILE}"
          if [ "${PROMOTE_TO}" = "prod" ]; then
            SOURCE_FILE="${STAGING_VALUES_FILE}"
          fi
          DESTINATION_FILE="${STAGING_VALUES_FILE}"
          if [ "${PROMOTE_TO}" = "prod" ]; then
            DESTINATION_FILE="${PROD_VALUES_FILE}"
          fi

          TAG_ARGS=()
          DIGEST_ARGS=()
          REPOSITORY_ARGS=()
          if [ -n "${IMAGE_TAG_INPUT}" ]; then
            ECR_REPOSITORY="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${PROJECT_NAME}/${SERVICE_NAME}"
            IMAGE_DIGEST="$(aws ecr describe-images \
              --repository-name "${PROJECT_NAME}/${SERVICE_NAME}" \
              --image-ids imageTag="${IMAGE_TAG_INPUT}" \
              --query 'imageDetails[0].imageDigest' \
              --output text)"
            if [ -z "${IMAGE_DIGEST}" ] || [ "${IMAGE_DIGEST}" = "None" ]; then
              echo "Image tag ${IMAGE_TAG_INPUT} does not exist in ECR for ${SERVICE_NAME}" >&2
              exit 1
            fi
            REPOSITORY_ARGS=(--repository "${ECR_REPOSITORY}")
            TAG_ARGS=(--tag "${IMAGE_TAG_INPUT}")
            DIGEST_ARGS=(--digest "${IMAGE_DIGEST}")
          fi

          python scripts/ci/update_image_values.py promote \
            --source "${SOURCE_FILE}" \
            --destination "${DESTINATION_FILE}" \
            "${REPOSITORY_ARGS[@]}" \
            "${TAG_ARGS[@]}" \
            "${DIGEST_ARGS[@]}"
        env:
          PROMOTE_TO: ${{ inputs.promote_to }}
          IMAGE_TAG_INPUT: ${{ inputs.image_tag }}

      - name: Commit promotion update
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "[CI]: Promote cart image to ${{ inputs.promote_to }}"
          file_pattern: gitops/helm-values/${{ inputs.promote_to }}/cart-values.yaml
