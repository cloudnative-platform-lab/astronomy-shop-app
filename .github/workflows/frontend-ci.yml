name: Frontend CI/CD

on:
  workflow_dispatch:
    inputs:
      promote_to:
        description: Environment to promote the existing frontend image to
        required: true
        type: choice
        options:
          - staging
          - prod
      image_tag:
        description: Existing image tag to promote. Leave empty to promote from previous environment.
        required: false
        type: string

  pull_request:
    paths:
      - 'src/frontend/**'
      - 'pb/**'
      - 'gitops/charts/astronomy-shop-service/**'
      - 'gitops/helm-values/**'
      - '.github/workflows/frontend-ci.yml'

  push:
    branches:
      - main
    paths:
      - 'src/frontend/**'
      - 'pb/**'
      - 'gitops/charts/astronomy-shop-service/**'
      - 'gitops/helm-values/**'
      - '.github/workflows/frontend-ci.yml'

permissions:
  contents: write
  id-token: write
  security-events: write
  attestations: write

concurrency:
  group: frontend-ci-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}

  PROJECT_NAME: astronomy-shop
  SERVICE_NAME: frontend
  SERVICE_PATH: src/frontend
  DOCKERFILE_PATH: src/frontend/Dockerfile

  IMAGE_TAG: ${{ github.sha }}

  DEV_VALUES_FILE: helm/frontend/values.yaml
  STAGING_VALUES_FILE: helm/frontend/values.yaml
  PROD_VALUES_FILE: helm/frontend/values.yaml


jobs:
  frontend-ci:
    name: CI - Test, Scan, Build, Dev Update
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ================= DEBUG ================= #
      - name: Verify frontend structure
        run: ls -la src/frontend

      # ================= PROTOC ================= #
      - name: Setup Protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '25.3'

      # ================= NODE ================= #
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      # ================= TRIVY FS SCAN =================
      - name: Trivy FS scan (source only)
        uses: aquasecurity/trivy-action@v0.19.0
        with:
          scan-type: fs
          scan-ref: src/frontend
          format: table
          severity: CRITICAL
          scanners: vuln
          exit-code: '1'

      # ================= INSTALL =================
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
        working-directory: src/frontend

      # ================= TEST =================
# ================= TEST =================
        # This project currently does not include an automated test suite or a
        # "test" script in src/frontend/package.json.
        #
        # Running "npm test" would fail with:
        #   npm ERR! Missing script: "test"
        #
        # This stage is intentionally skipped until automated tests
        # are added to the application.
      - name: Skip tests
        run: echo "No automated test suite available. Skipping test stage."

      # ================= BUILD (FIXED HERE ONLY) =================
      - name: Build
        run: |
          set -e
          npm run grpc:generate
          npx next build
        working-directory: src/frontend
        env:
          # FIX: make root pb accessible inside frontend scripts
          PB_PATH: ../../pb

      # ================= IMAGE METADATA ================= #
      - name: Set image metadata
        run: |
          ECR_REPOSITORY_NAME="${PROJECT_NAME}/${SERVICE_NAME}"
          ECR_REPOSITORY="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY_NAME}"
          IMAGE_URI="${ECR_REPOSITORY}:${IMAGE_TAG}"

          echo "ECR_REPOSITORY_NAME=${ECR_REPOSITORY_NAME}" >> $GITHUB_ENV
          echo "ECR_REPOSITORY=${ECR_REPOSITORY}" >> $GITHUB_ENV
          echo "IMAGE_URI=${IMAGE_URI}" >> $GITHUB_ENV

      # ================= DOCKER BUILD =================
      - name: Build Docker image
        run: |
          docker build \
            -f "${DOCKERFILE_PATH}" \
            -t "${IMAGE_URI}" \
            .

      # ================= TRIVY IMAGE SCAN =================
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@v0.19.0
        with:
          image-ref: ${{ env.IMAGE_URI }}
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'

      - name: Upload SARIF
        if: success() && hashFiles('trivy.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif

      # ================= SBOM =================
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE_URI }}
          format: spdx-json
          output-file: frontend-sbom.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: frontend-sbom
          path: frontend-sbom.spdx.json

      # ================= AWS PUSH =================
      - name: Configure AWS
        if: github.event_name == 'push'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        if: github.event_name == 'push'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push image
        if: github.event_name == 'push'
        run: docker push "${IMAGE_URI}"

      # ================= DIGEST ================= #
      - name: Resolve image digest
        if: github.event_name == 'push'
        run: |
          IMAGE_DIGEST=$(aws ecr describe-images \
            --repository-name "${ECR_REPOSITORY_NAME}" \
            --image-ids imageTag="${IMAGE_TAG}" \
            --query 'imageDetails[0].imageDigest' \
            --output text)

          echo "IMAGE_DIGEST=${IMAGE_DIGEST}" >> $GITHUB_ENV
          echo "IMAGE_REF=${ECR_REPOSITORY}@${IMAGE_DIGEST}" >> $GITHUB_ENV

      # ================= COSIGN =================
      - name: Install Cosign
        if: github.event_name == 'push'
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        if: github.event_name == 'push'
        run: cosign sign "${IMAGE_REF}"
        env:
          COSIGN_YES: 'true'

      # ================= ATTESTATION =================
      - name: Provenance attestation
        if: github.event_name == 'push'
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.ECR_REPOSITORY }}
          subject-digest: ${{ env.IMAGE_DIGEST }}
          push-to-registry: true

      - name: SBOM attestation
        if: github.event_name == 'push'
        run: |
          cosign attest \
            --predicate frontend-sbom.spdx.json \
            --type spdxjson \
            "${IMAGE_REF}"
        env:
          COSIGN_YES: 'true'

      # ================= DEV UPDATE =================
      - name: Update dev Helm values
        if: github.event_name == 'push'
        run: |
          python scripts/ci/update_image_values.py set \
            --file "${DEV_VALUES_FILE}" \
            --repository "${ECR_REPOSITORY}" \
            --tag "${IMAGE_TAG}" \
            --digest "${IMAGE_DIGEST}"

      - name: Commit dev update
        if: github.event_name == 'push'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: '[CI] Update frontend image in dev'
          file_pattern: helm/frontend/values.yaml


  # ================= PROMOTION =================
  frontend-promotion:
    name: Promote Image (staging/prod)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: ${{ inputs.promote_to }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Promote image
        run: |
          set -e

          SOURCE_FILE="${DEV_VALUES_FILE}"
          DEST_FILE="${STAGING_VALUES_FILE}"

          if [ "${{ inputs.promote_to }}" = "prod" ]; then
            SOURCE_FILE="${STAGING_VALUES_FILE}"
            DEST_FILE="${PROD_VALUES_FILE}"
          fi

          EXTRA_ARGS=""

          if [ -n "${{ inputs.image_tag }}" ]; then
            ECR_REPOSITORY="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${PROJECT_NAME}/${SERVICE_NAME}"
            IMAGE_TAG="${{ inputs.image_tag }}"

            IMAGE_DIGEST=$(aws ecr describe-images \
              --repository-name "${PROJECT_NAME}/${SERVICE_NAME}" \
              --image-ids imageTag="${IMAGE_TAG}" \
              --query 'imageDetails[0].imageDigest' \
              --output text)

            EXTRA_ARGS="--repository ${ECR_REPOSITORY} --tag ${IMAGE_TAG} --digest ${IMAGE_DIGEST}"
          fi

          python scripts/ci/update_image_values.py promote \
            --source "${SOURCE_FILE}" \
            --destination "${DEST_FILE}" \
            ${EXTRA_ARGS}

      - name: Commit promotion
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: '[CI] Promote frontend to ${{ inputs.promote_to }}'
          file_pattern: gitops/helm-vals/**/frontend-values.yaml
