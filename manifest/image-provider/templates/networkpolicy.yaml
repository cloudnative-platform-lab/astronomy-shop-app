apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: image-provider
  labels:
    app.kubernetes.io/name: image-provider
    app.kubernetes.io/part-of: astronomy-shop
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: image-provider
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: frontend
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: frontend-proxy
      ports:
        - protocol: TCP
          port: 8081
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: otel-collector
      ports:
        - protocol: TCP
          port: 4317
