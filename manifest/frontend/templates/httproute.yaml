{{- if .Values.httpRoute.enabled | default false -}}
{{- $fullName := include "frontend.fullname" . -}}
{{- $svcPort := .Values.service.port -}}

apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute

metadata:
  name: {{ $fullName }}
  labels:
    {{- include "frontend.labels" . | nindent 4 }}
  {{- with (.Values.httpRoute.annotations | default dict) }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}

spec:

  {{- with (.Values.httpRoute.parentRefs | default list) }}
  parentRefs:
    {{- toYaml . | nindent 4 }}
  {{- end }}

  {{- with (.Values.httpRoute.hostnames | default list) }}
  hostnames:
    {{- toYaml . | nindent 4 }}
  {{- end }}

  rules:
    {{- range (.Values.httpRoute.rules | default list) }}
    - {{- if .matches }}
      matches:
        {{- toYaml .matches | nindent 8 }}
      {{- end }}

      {{- if .filters }}
      filters:
        {{- toYaml .filters | nindent 8 }}
      {{- end }}

      backendRefs:
        - name: {{ $fullName }}
          port: {{ $svcPort }}
          weight: 1
    {{- end }}

{{- end }}