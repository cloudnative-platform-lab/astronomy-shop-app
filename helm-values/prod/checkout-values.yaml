service:
  name: checkout
  environment: prod

image:
  repository: ""
  tag: ""
  pullPolicy: IfNotPresent

replicaCount: 3

resources:
  requests:
    cpu: 300m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 8
  targetCPUUtilizationPercentage: 60
  targetMemoryUtilizationPercentage: 70

rollout:
  strategy: canary
  steps:
    - setWeight: 10
    - pause: 10m
    - setWeight: 25
    - pause: 15m
    - setWeight: 50
    - pause: 15m
    - setWeight: 100

observability:
  metrics:
    enabled: true
  tracing:
    enabled: true
