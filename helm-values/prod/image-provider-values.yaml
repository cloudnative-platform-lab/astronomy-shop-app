service:
  name: image-provider
  environment: prod
  port: 8081
  targetPort: 8081

image:
  repository: ""
  tag: ""
  digest: ""
  pullPolicy: IfNotPresent

replicaCount: 3

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false

resources:
  requests:
    cpu: 150m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 6
  targetCPUUtilizationPercentage: 60
  targetMemoryUtilizationPercentage: 70

rollout:
  strategy: canary
  steps:
    - setWeight: 10
    - pause: 10m
    - setWeight: 25
    - pause: 15m
    - setWeight: 50
    - pause: 15m
    - setWeight: 100

observability:
  metrics:
    enabled: true
  tracing:
    enabled: true

env:
  - name: IMAGE_PROVIDER_PORT
    value: "8081"
  - name: OTEL_COLLECTOR_HOST
    value: "otel-collector"
  - name: OTEL_COLLECTOR_PORT_GRPC
    value: "4317"
