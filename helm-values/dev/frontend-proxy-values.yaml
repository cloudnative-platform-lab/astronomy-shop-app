service:
  name: frontend-proxy
  environment: dev
  port: 8080
  targetPort: 8080

image:
  repository: ""
  tag: ""
  digest: ""
  pullPolicy: IfNotPresent

replicaCount: 1

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 2
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

rollout:
  strategy: rollingUpdate
  maxUnavailable: 0
  maxSurge: 1

observability:
  metrics:
    enabled: true
  tracing:
    enabled: true

ingress:
  enabled: true
  className: alb
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/healthcheck-path: /
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}]'
  hosts:
    - host: dev.astronomy-shop.example.com
      paths:
        - path: /
          pathType: Prefix

env:
  - name: FRONTEND_HOST
    value: "frontend"
  - name: FRONTEND_PORT
    value: "8080"
  - name: IMAGE_PROVIDER_HOST
    value: "image-provider"
  - name: IMAGE_PROVIDER_PORT
    value: "8081"
